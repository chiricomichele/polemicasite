apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: clone-build-push
  namespace: tekton-tasks
spec:
  params:
  - name: repo-url
    type: string
  - name: web-dockerfile-path
    type: string
    default: "./Dockerfile"
  - name: git-branch
    type: string
    default: "main"
  workspaces:
  - name: shared-data
    description: Cloned repo files shared across tasks
  - name: docker-credentials
    description: Docker credentials for pushing the image
  - name: ssh-credentials
    description: SSH credentials for git operations
  tasks:
  - name: fetch-source
    taskRef:
      name: git-clone
    workspaces:
    - name: output
      workspace: shared-data
    params:
    - name: url
      value: $(params.repo-url)
  - name: compute-version
    runAfter: [ "fetch-source" ]
    taskRef:
      name: compute-semver
    workspaces:
    - name: source
      workspace: shared-data
    params:
    - name: bump
      value: $(params.bump)
  - name: build-push-web
    runAfter: [ "compute-version" ]
    taskRef:
      name: buildah
    workspaces:
    - name: source
      workspace: shared-data
    - name: dockerconfig
      workspace: docker-credentials
    params:
    - name: IMAGE
      value: $(tasks.compute-version.results.new-image)
    - name: DOCKERFILE
      value: $(params.web-dockerfile-path)
  - name: update-deployment
    runAfter: [ "build-push-web" ]
    taskRef:
      name: update-deployment
    workspaces:
    - name: source
      workspace: shared-data
    params:
    - name: image-tag
      value: $(tasks.compute-version.results.new-version)
    - name: deployment-path
      value: "eng/k8s/deployment-webapp.yaml"
  - name: git-tag-and-push
    runAfter: [ "update-deployment" ]
    taskRef:
      name: git-tag-and-push
    workspaces:
    - name: source
      workspace: shared-data
    - name: ssh-credentials
      workspace: ssh-credentials
    params:
    - name: release-version
      value: $(tasks.compute-version.results.new-version)
    - name: git-branch
      value: $(params.git-branch)
