apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: release-
  namespace: tekton-tasks
spec:
  serviceAccountName: git-credentials-sa
  pipelineRef:
    name: clone-build-push
  podTemplate:
    securityContext:
      fsGroup: 65532
  workspaces:
  - name: shared-data
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
  - name: docker-credentials
    secret:
      secretName: docker-credentials
      items:
      - key: .dockerconfigjson
        path: config.json
  - name: ssh-credentials
    secret:
      secretName: git-credentials
  params:
  - name: repo-url
    value: ssh://git@github.com/polemicaleague-source/polemicasite.git
  - name: webapp-reference-image
    value: michelechirico/polemicasite
  - name: web-dockerfile-path
    value: ./Dockerfile
  - name: git-branch
    value: main