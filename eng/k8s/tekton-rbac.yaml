---
# ServiceAccount usata dalla pipeline per eseguire i task
apiVersion: v1
kind: ServiceAccount
metadata:
  name: git-credentials-sa
  namespace: tekton-tasks
  annotations:
    # Indica esplicitamente i secret a cui la SA ha accesso
    tekton.dev/git-0: github.com
---
# Role: permessi necessari nel namespace tekton-tasks
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tekton-pipeline-runner
  namespace: tekton-tasks
rules:
  # Leggere e usare i Secret (git-credentials, docker-credentials)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Leggere ConfigMap (es. pipeline config)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Gestire i Pod creati dai task Tekton
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  # Log dei Pod
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  # PersistentVolumeClaim per i workspace
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Risorse Tekton: TaskRun e PipelineRun
  - apiGroups: ["tekton.dev"]
    resources: ["tasks", "taskruns", "pipelines", "pipelineruns"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pipeline results
  - apiGroups: ["tekton.dev"]
    resources: ["taskruns/status", "pipelineruns/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
# RoleBinding: associa il Role alla ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-pipeline-runner-binding
  namespace: tekton-tasks
subjects:
  - kind: ServiceAccount
    name: git-credentials-sa
    namespace: tekton-tasks
roleRef:
  kind: Role
  name: tekton-pipeline-runner
  apiGroup: rbac.authorization.k8s.io
