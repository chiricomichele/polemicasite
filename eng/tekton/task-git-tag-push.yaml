apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: git-tag-and-push
  namespace: tekton-tasks
spec:
  description: |
    Pushes committed changes to git repository and creates a release tag.
  params:
  - name: release-version
    type: string
    description: "Release version tag (e.g., v1.0.0)"
  - name: git-branch
    type: string
    default: "main"
    description: "Git branch to push to"
  workspaces:
  - name: source
    description: "Git repository workspace"
  - name: ssh-credentials
    description: "SSH credentials for git operations"
  steps:
  - name: push-and-tag
    image: alpine/git:v2.36.2
    workingDir: $(workspaces.source.path)
    script: |
      #!/bin/sh
      set -e

      export HOME=/home/git
      mkdir -p "$HOME/.ssh"
      chmod 700 "$HOME/.ssh"

      if [ -f "$(workspaces.ssh-credentials.path)/id_ed25519" ]; then
        cp "$(workspaces.ssh-credentials.path)/id_ed25519" "$HOME/.ssh/id_ed25519"
      elif [ -f "$(workspaces.ssh-credentials.path)/ssh-privatekey" ]; then
        cp "$(workspaces.ssh-credentials.path)/ssh-privatekey" "$HOME/.ssh/id_ed25519"
      else
        echo "SSH private key not found in workspace $(workspaces.ssh-credentials.path)"
        exit 1
      fi

      chmod 600 "$HOME/.ssh/id_ed25519"
      ssh-keyscan -p 443 -t ed25519 ssh.github.com > "$HOME/.ssh/known_hosts" 2>/dev/null || true
      chmod 600 "$HOME/.ssh/known_hosts"
      export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/id_ed25519 -p 443 -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"

      # Configure git
      git config --global user.email "pipeline@polemicasite.local"
      git config --global user.name "Tekton Pipeline"
      git config --global --add safe.directory $(workspaces.source.path)

      echo "Pushing changes to $(params.git-branch)..."
      git push origin $(params.git-branch)

      echo "Creating and pushing git tag $(params.release-version)..."
      git tag -a $(params.release-version) -m "Release $(params.release-version)"
      git push origin $(params.release-version)

      echo "✅ Pushed to $(params.git-branch) and created tag $(params.release-version)"
